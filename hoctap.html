<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Góc học tập lớp 12A2</title>

<style>

/* ===== RESET ===== */
body{
margin:0;
font-family:Arial, sans-serif;
overflow-x:hidden;
}

/* ===== NAVBAR ===== */
.navbar{
display:flex;
align-items:center;
justify-content:space-between;
padding:10px 25px;
background:#fff3d6;
border-bottom:3px dashed #f0c98a;
position:relative;
z-index:10;
}

.logo img{
height:60px;
}

.menu{
display:flex;
gap:15px;
}

.menu a{
text-decoration:none;
color:#7a4e00;
padding:8px 18px;
border:2px dashed #e6b96b;
border-radius:20px;
font-weight:bold;
transition:0.3s;
}

.menu a:hover{
background:#ffd27a;
}

.menu a.active{
background:linear-gradient(#ffcc66,#f4a300);
color:white;
border:2px solid #e09a00;
}

.login-btn{
background:linear-gradient(#ffcc66,#f4a300);
color:white;
padding:10px 20px;
border-radius:25px;
font-weight:bold;
text-decoration:none;
border:2px solid #e09a00;
}

/* ===== SECTION ===== */
.study-section{
position:relative;
}

/* ===== ẢNH FULL MÀN HÌNH ===== */
.study-img{
width:100%;
height:auto;
display:block;
}

/* container ảnh cuối */
.last-img-container{
position:relative;
width:100%;
}

/* footer đè lên ảnh */
.footer-text{

position:absolute;

bottom:20px;
left:50%;

transform:translateX(-50%);

font-size:18px;

color:#7a4e00;

background:rgba(255,255,255,0.8);

padding:10px 20px;

border-radius:15px;

box-shadow:0 5px 15px rgba(0,0,0,0.2);

}
</style>
</head>

<body>

<!-- NAVBAR -->
<div class="navbar">

<div class="logo">
<a href="index.html">
<img src="logo.png">
</a>
</div>

<div class="menu">

<a href="index.html">Trang Chủ</a>

<a href="gioithieu.html">Giới Thiệu</a>

<a href="hoatdong.html">Hoạt Động</a>

<a href="hoctap.html" class="active">Góc Học Tập</a>

<a href="album.html">Album Ảnh</a>

</div>

<div id="login-area"></div>

</div>


<!-- NỘI DUNG -->
<div class="study-section">

<img src="gochoctap.jpg" class="study-img">

<img src="pp1.jpg" class="study-img">

<img src="pp2.jpg" class="study-img">

<img src="pp3.jpg" class="study-img">

<img src="pp4.jpg" class="study-img">

<img src="pp5.jpg" class="study-img">

<img src="pp6.jpg" class="study-img">

<div class="last-img-container">


    <div class="footer-text">
        © 2026 Lớp 12A2. | All rights reserved.
    </div>

</div>
</div>


</div>
<script>
let user = localStorage.getItem("daDangNhap");
let area = document.getElementById("login-area");

if(user){
area.innerHTML = `
<a href="taikhoan.html">
<img src="logodangki.png" style="height:50px;cursor:pointer;">
</a>
`;
}else{
area.innerHTML = `
<a href="dangnhap.html">
<button class="login-btn">Đăng Nhập</button>
</a>
`;
}
</script>
</body>
</html>
