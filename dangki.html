<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Đăng Ký 12A2</title>

<style>

/* nền */
body{
    margin:0;
    font-family:'Segoe UI', sans-serif;
    background: linear-gradient(#ffdca8,#ffecc8);

    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

/* khung chính */
.box{

    width:420px;

    background:white;

    padding:35px;

    border-radius:25px;

    text-align:center;

    box-shadow:0 10px 30px rgba(0,0,0,0.2);

    animation: float 3s ease-in-out infinite;
}

/* animation nổi */
@keyframes float{

0%,100%{transform:translateY(0);}
50%{transform:translateY(-10px);}

}

/* tiêu đề */
h2{
    color:#ff9933;
    margin-bottom:20px;
}

/* input */
input{

    width:100%;

    padding:14px;

    margin-bottom:14px;

    border-radius:20px;

    border:3px solid #ffc86b;

    font-size:16px;

    box-sizing:border-box;

    transition:0.3s;
}

input:focus{

    border-color:#ff9933;

    transform:scale(1.03);
}

/* nút đăng ký */
.register-btn{

    width:100%;

    padding:14px;

    border:none;

    border-radius:30px;

    background:linear-gradient(#66b3ff,#0066cc);

    color:white;

    font-size:18px;

    font-weight:bold;

    cursor:pointer;

    transition:0.3s;
}

.register-btn:hover{

    transform:scale(1.05);

    box-shadow:0 5px 15px rgba(0,0,0,0.2);
}

/* quay lại */
.back{

    margin-top:15px;
}

.back a{

    text-decoration:none;

    color:#cc8800;

    font-weight:bold;

    transition:0.3s;
}

.back a:hover{

    color:#ff6600;
}

</style>
</head>

<body>

<div class="box">

<h2>Đăng Ký Tài Khoản</h2>

<input id="user" type="text" placeholder="Tên tài khoản">

<input id="pass" type="password" placeholder="Mật khẩu (≥6 ký tự)">

<input id="repass" type="password" placeholder="Nhập lại mật khẩu">

<input id="chidoan" type="text" placeholder="Chi đoàn">

<input id="vaitro" type="text" placeholder="Vai trò">

<input id="sdt" type="text" placeholder="Số điện thoại">

<input id="gmail" type="email" placeholder="Gmail">

<input id="truong" type="text" placeholder="Trường">

<button class="register-btn" onclick="dangKy()">
Đăng Ký
</button>

<div class="back">
<a href="index.html">← Quay về trang chủ</a>
</div>

</div>

<script>

function dangKy(){

let user = document.getElementById("user").value.trim();
let pass = document.getElementById("pass").value;
let repass = document.getElementById("repass").value;

let chidoan = document.getElementById("chidoan").value;
let vaitro = document.getElementById("vaitro").value;
let sdt = document.getElementById("sdt").value;
let gmail = document.getElementById("gmail").value;
let truong = document.getElementById("truong").value;

/* kiểm tra */
if(user===""||pass===""||repass===""){

alert("Vui lòng nhập đầy đủ thông tin!");
return;

}

if(pass.length < 6){

alert("Mật khẩu phải có ít nhất 6 ký tự!");
return;

}

if(pass !== repass){

alert("Mật khẩu nhập lại không khớp!");
return;

}

/* lưu dữ liệu */
localStorage.setItem("username", user);
localStorage.setItem("password", pass);
localStorage.setItem("chidoan", chidoan);
localStorage.setItem("vaitro", vaitro);
localStorage.setItem("sdt", sdt);
localStorage.setItem("gmail", gmail);
localStorage.setItem("truong", truong);

/* trạng thái đăng nhập */
localStorage.setItem("daDangNhap", user);

alert("Đăng ký thành công! 🎉");

/* quay về trang chủ */
window.location.href = "index.html";

}

</script>

</body>
</html>
