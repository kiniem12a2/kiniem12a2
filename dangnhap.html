<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Đăng Nhập 12A2</title>

<style>

body{
margin:0;
font-family:Arial;
background: linear-gradient(#ffecc8,#ffdca8);
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

/* khung */
.login-box{

background:#fff6e6;
padding:40px;
border-radius:25px;
width:400px;
text-align:center;

box-shadow:0 10px 30px rgba(0,0,0,0.2);

animation: float 3s ease-in-out infinite;
}

/* animation */
@keyframes float{

0%,100%{transform:translateY(0);}
50%{transform:translateY(-10px);}

}

h2{

color:#e69500;
margin-bottom:20px;
}

/* input */
input{

width:100%;
padding:14px;
margin-bottom:15px;

border-radius:20px;
border:3px solid #ffc86b;

font-size:16px;

box-sizing:border-box; /* THÊM DÒNG NÀY */

}
input:focus{

border-color:#ff9933;
transform:scale(1.03);
}

/* nút */
.login-btn{

width:100%;
padding:14px;

border:none;
border-radius:30px;

background:linear-gradient(#ffc86b,#ff9933);

color:white;
font-size:18px;

cursor:pointer;

box-sizing:border-box; /* THÊM */

}

.login-btn:hover{

transform:scale(1.05);
}

/* đăng ký link */
.register{

margin-top:15px;
font-size:15px;
}

.register a{

color:#0066cc;
font-weight:bold;
text-decoration:none;
}

.register a:hover{

text-decoration:underline;
}
.back{

margin-top:15px;
}

.back a{

text-decoration:none;
color:#cc8800;
font-weight:bold;
transition:0.3s;
}

.back a:hover{

color:#ff6600;
}
</style>
</head>

<body>

<div class="login-box">

<h2>Đăng Nhập 12A2</h2>

<input id="username" type="text" placeholder="Tên đăng nhập">

<input id="password" type="password" placeholder="Mật khẩu">

<button onclick="dangNhap()" class="login-btn">
Đăng Nhập
</button>

<div class="register">
Bạn chưa có tài khoản?
<a href="dangki.html">Đăng ký ngay</a>
<div class="back">
<a href="index.html">← Quay về trang chủ</a>
</div>
</div>

</div>
<script>

function dangNhap(){

let user = document.getElementById("username").value;
let pass = document.getElementById("password").value;

let savedUser = localStorage.getItem("username");
let savedPass = localStorage.getItem("password");

if(user === savedUser && pass === savedPass){

alert("Đăng nhập thành công!");

// lưu trạng thái đăng nhập
localStorage.setItem("daDangNhap", user);

// quay về trang chủ
window.location.href = "index.html";

}
else{

alert("Sai tên đăng nhập hoặc mật khẩu!");

}

}

</script>

</body>
</html>
